name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Run PostgreSQL 18 integration test
        run: pnpm test:integration

      - name: Build workspace
        run: pnpm build

      - name: Build Storybook
        run: pnpm build:storybook

      - name: Install Storybook browser
        run: pnpm --filter @koharu-suite/ui exec playwright install --with-deps chromium

      - name: Test Storybook interactions and accessibility
        run: pnpm test:storybook

      - name: Smoke-test CLI
        run: pnpm exec kodama --help

      - name: Validate Compose
        env:
          BETTER_AUTH_SECRET: ci-only-better-auth-secret-32-chars
          BETTER_AUTH_URL: http://localhost:3000
          TELEGRAM_BOT_TOKEN: 123456789:ci-compose-config-only
        run: docker compose config --quiet

      - name: Run Compose smoke
        run: ./scripts/compose-smoke/run.sh
